name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS DMG
            script: package:mac
            artifact_name: sinav-programi-robotu-macos
            glob: "release/*.dmg"
          - os: windows-latest
            label: Windows EXE
            script: package:win
            artifact_name: sinav-programi-robotu-windows
            glob: "release/*.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build installer
        run: npm run ${{ matrix.script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          name: "Sınav Programı Robotu ${{ github.ref_name }}"
          body: |
            ## Kurulum

            | Platform | İndir |
            |---|---|
            | **macOS** | `.dmg` dosyasını indir → aç → uygulamayı Applications klasörüne sürükle |
            | **Windows** | `.exe` dosyasını indir → çalıştır → kurulum sihirbazını takip et |

            > API anahtarı almak için: [console.groq.com](https://console.groq.com) (ücretsiz)
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
